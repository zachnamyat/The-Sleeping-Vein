<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Sleeping Vein — Kanban</title>
<style>
  :root {
    --bg: #0e0d12;
    --bg-2: #15141b;
    --bg-3: #1d1c25;
    --bg-4: #25232e;
    --fg: #e8e3d6;
    --fg-dim: #998d75;
    --accent: #d4a857;          /* Aphelion gold */
    --accent-dim: #836838;
    --danger: #c44a1d;          /* Emberforge red */
    --ok: #7bbf64;              /* Verdancy green */
    --info: #6e8fc4;            /* Glasswright blue */
    --warn: #f08a2e;
    --purple: #7062d7;          /* Auroric Veil */
    --salt: #bdb5a8;            /* Salt Wastes */
    --pink: #c44a8a;
    --border: #2a2832;
    --border-strong: #3d3a47;
    --shadow: 0 2px 6px rgba(0,0,0,0.6);
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace;
    background: var(--bg);
    color: var(--fg);
    font-size: 13px;
    line-height: 1.4;
  }

  header {
    padding: 14px 22px;
    background: var(--bg-2);
    border-bottom: 1px solid var(--border-strong);
    display: flex;
    align-items: baseline;
    gap: 18px;
    flex-wrap: wrap;
  }
  header h1 {
    margin: 0;
    font-size: 18px;
    color: var(--accent);
    letter-spacing: 0.5px;
    font-weight: 600;
  }
  header .subtitle {
    color: var(--fg-dim);
    font-size: 12px;
  }
  header .stats {
    margin-left: auto;
    color: var(--fg-dim);
    font-size: 12px;
  }
  header .stats span { color: var(--fg); margin: 0 6px; }
  header .stats span.done { color: var(--ok); }
  header .stats span.progress { color: var(--accent); }

  .toolbar {
    display: flex;
    gap: 8px;
    padding: 10px 22px;
    background: var(--bg-2);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    align-items: center;
  }
  .toolbar input, .toolbar select, .toolbar button {
    background: var(--bg-3);
    color: var(--fg);
    border: 1px solid var(--border-strong);
    padding: 5px 9px;
    font-family: inherit;
    font-size: 12px;
    border-radius: 3px;
  }
  .toolbar input:focus, .toolbar select:focus {
    outline: none;
    border-color: var(--accent);
  }
  .toolbar button {
    cursor: pointer;
    transition: background 0.1s;
  }
  .toolbar button:hover { background: var(--bg-4); }
  .toolbar button.primary {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: #0e0d12;
    font-weight: 600;
  }
  .toolbar button.primary:hover { background: var(--accent); }
  .toolbar .toolbar-label {
    color: var(--fg-dim);
    margin-left: 6px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .phases {
    padding: 14px 22px 60px;
  }

  .phase {
    margin-bottom: 28px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .phase-header {
    background: var(--bg-3);
    padding: 10px 14px;
    cursor: pointer;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
  }
  .phase-header:hover { background: var(--bg-4); }
  .phase-header .twist {
    color: var(--fg-dim);
    transition: transform 0.15s;
    display: inline-block;
    width: 12px;
  }
  .phase.collapsed .phase-header .twist { transform: rotate(-90deg); }
  .phase.collapsed .phase-body { display: none; }
  .phase-header h2 {
    margin: 0;
    font-size: 14px;
    color: var(--accent);
    font-weight: 600;
  }
  .phase-header .phase-desc {
    color: var(--fg-dim);
    font-size: 12px;
    font-weight: 400;
  }
  .phase-header .phase-count {
    margin-left: auto;
    font-size: 11px;
    color: var(--fg-dim);
  }
  .phase-header .phase-count span.done { color: var(--ok); }

  .phase-body {
    display: grid;
    grid-template-columns: repeat(5, minmax(220px, 1fr));
    gap: 0;
  }
  .lane {
    background: var(--bg-2);
    border-right: 1px solid var(--border);
    min-height: 80px;
  }
  .lane:last-child { border-right: none; }
  .lane-header {
    padding: 8px 12px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--fg-dim);
    background: var(--bg-3);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
  }
  .lane-header.lane-backlog { color: var(--fg-dim); }
  .lane-header.lane-ready { color: var(--info); }
  .lane-header.lane-in_progress { color: var(--accent); }
  .lane-header.lane-review { color: var(--warn); }
  .lane-header.lane-done { color: var(--ok); }
  .lane-count {
    font-weight: 600;
    color: var(--fg);
  }
  .lane-body {
    min-height: 60px;
    padding: 6px;
  }
  .lane-body.drag-over {
    background: rgba(212, 168, 87, 0.08);
  }

  .card {
    background: var(--bg-3);
    border: 1px solid var(--border-strong);
    border-left: 3px solid var(--accent);
    border-radius: 3px;
    padding: 7px 9px;
    margin-bottom: 6px;
    cursor: grab;
    box-shadow: var(--shadow);
    transition: transform 0.1s, border-color 0.1s;
    font-size: 12px;
  }
  .card:hover {
    transform: translateY(-1px);
    border-color: var(--accent-dim);
  }
  .card.dragging {
    opacity: 0.4;
    cursor: grabbing;
  }
  .card-id {
    color: var(--accent);
    font-weight: 600;
    font-size: 10px;
    margin-right: 6px;
  }
  .card-title {
    display: inline;
    color: var(--fg);
  }
  .card-tags {
    margin-top: 5px;
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
  }
  .tag {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 2px;
    background: var(--bg-4);
    color: var(--fg-dim);
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .tag.parity { background: #1d3a2e; color: var(--ok); }
  .tag.extension { background: #3a1d3a; color: var(--pink); }
  .tag.infra { background: #1d2c3a; color: var(--info); }
  .tag.art { background: #3a2e1d; color: var(--accent); }
  .tag.lore { background: #3a1d1d; color: #f0a878; }
  .tag.test { background: #1d2a2a; color: #88c4c4; }
  .tag.netcode { background: #2a1d3a; color: var(--purple); }

  /* Border colors per lane indicate status visually */
  .card[data-status="backlog"] { border-left-color: var(--fg-dim); }
  .card[data-status="ready"] { border-left-color: var(--info); }
  .card[data-status="in_progress"] { border-left-color: var(--accent); }
  .card[data-status="review"] { border-left-color: var(--warn); }
  .card[data-status="done"] {
    border-left-color: var(--ok);
    opacity: 0.65;
  }
  .card[data-status="done"] .card-title { text-decoration: line-through; }

  /* Modal */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--bg-2);
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    width: 540px;
    max-width: 92%;
    max-height: 88vh;
    overflow-y: auto;
    padding: 18px;
  }
  .modal h3 {
    color: var(--accent);
    margin: 0 0 12px;
    font-size: 15px;
  }
  .modal label {
    display: block;
    margin: 10px 0 4px;
    color: var(--fg-dim);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .modal input, .modal select, .modal textarea {
    width: 100%;
    background: var(--bg-3);
    color: var(--fg);
    border: 1px solid var(--border-strong);
    padding: 7px 9px;
    font-family: inherit;
    font-size: 12px;
    border-radius: 3px;
  }
  .modal input:focus, .modal select:focus, .modal textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .modal textarea {
    min-height: 90px;
    resize: vertical;
    font-family: inherit;
  }
  .modal .tag-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 4px;
  }
  .modal .tag-pick {
    cursor: pointer;
    user-select: none;
    padding: 3px 9px;
    border-radius: 2px;
    background: var(--bg-3);
    border: 1px solid var(--border-strong);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: var(--fg-dim);
  }
  .modal .tag-pick.active { background: var(--accent-dim); color: #0e0d12; border-color: var(--accent); }
  .modal .actions {
    margin-top: 18px;
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }
  .modal .actions button {
    padding: 7px 14px;
    background: var(--bg-3);
    color: var(--fg);
    border: 1px solid var(--border-strong);
    cursor: pointer;
    border-radius: 3px;
    font-family: inherit;
    font-size: 12px;
  }
  .modal .actions button.primary {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: #0e0d12;
    font-weight: 600;
  }
  .modal .actions button.danger {
    background: var(--danger);
    border-color: var(--danger);
    color: white;
  }
  .modal .actions button:hover { filter: brightness(1.2); }

  .empty-hint {
    color: var(--fg-dim);
    text-align: center;
    font-size: 11px;
    font-style: italic;
    padding: 12px 6px;
    opacity: 0.6;
  }

  footer {
    padding: 12px 22px;
    text-align: center;
    color: var(--fg-dim);
    font-size: 11px;
    border-top: 1px solid var(--border);
    background: var(--bg-2);
  }
  footer a { color: var(--accent); }

  /* Filter inactive */
  .card.filtered-out { display: none; }
  .phase.empty-by-filter { display: none; }

  @media (max-width: 1100px) {
    .phase-body { grid-template-columns: 1fr 1fr; }
    .lane { border-right: 1px solid var(--border); }
  }
  @media (max-width: 600px) {
    .phase-body { grid-template-columns: 1fr; }
  }
</style>
</head>

<header>
  <h1>The Sleeping Vein</h1>
  <span class="subtitle">Mechanical parity with Core Keeper → custom extensions. Saved locally in your browser.</span>
  <div class="stats" id="globalStats">—</div>
</header>

<div class="toolbar">
  <button class="primary" id="addBtn">+ New Card</button>
  <button id="collapseAllBtn">Collapse All</button>
  <button id="expandAllBtn">Expand All</button>

  <span class="toolbar-label">Filter:</span>
  <input type="text" id="filterText" placeholder="Search title or ID…" style="flex: 1; min-width: 140px; max-width: 320px;">
  <select id="filterTag">
    <option value="">All tags</option>
    <option value="parity">parity</option>
    <option value="extension">extension</option>
    <option value="infra">infra</option>
    <option value="art">art</option>
    <option value="lore">lore</option>
    <option value="test">test</option>
    <option value="netcode">netcode</option>
  </select>
  <select id="filterStatus">
    <option value="">All statuses</option>
    <option value="backlog">Backlog</option>
    <option value="ready">Ready</option>
    <option value="in_progress">In Progress</option>
    <option value="review">Review</option>
    <option value="done">Done</option>
  </select>

  <span style="flex: 1"></span>
  <button id="exportBtn">Export JSON</button>
  <button id="importBtn">Import JSON</button>
  <button id="resetBtn">Reset</button>
</div>

<div class="phases" id="phases"></div>

<footer>
  Drag cards between lanes. Click a card to edit. Data lives in your browser's localStorage —
  <a href="ROADMAP.md">ROADMAP.md</a> · <a href="docs/reference/core-keeper-mechanics.md">Parity reference</a> · <a href="docs/design/00_tile_atlas_spec.md">Tile spec</a> · <a href="docs/design/02_lore_to_mechanics_mapping.md">Lore mapping</a>
</footer>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <h3 id="modalTitle">Edit Card</h3>
    <label>ID</label>
    <input type="text" id="m_id" placeholder="e.g. 1.5">
    <label>Title</label>
    <input type="text" id="m_title">
    <label>Phase</label>
    <select id="m_phase"></select>
    <label>Status</label>
    <select id="m_status">
      <option value="backlog">Backlog</option>
      <option value="ready">Ready</option>
      <option value="in_progress">In Progress</option>
      <option value="review">Review</option>
      <option value="done">Done</option>
    </select>
    <label>Tags</label>
    <div class="tag-row" id="m_tags"></div>
    <label>Description / acceptance criteria (optional)</label>
    <textarea id="m_desc"></textarea>
    <div class="actions">
      <button class="danger" id="m_delete">Delete</button>
      <span style="flex:1"></span>
      <button id="m_cancel">Cancel</button>
      <button class="primary" id="m_save">Save</button>
    </div>
  </div>
</div>

function loadOrSeed() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed.tickets)) return parsed;
    }
  } catch (e) {
    console.warn('Failed to load saved kanban; using seed.', e);
  }
  return { tickets: SEED_TICKETS.map(t => ({ status: 'backlog', desc: '', ...t })) };
}

function runPendingMigrations() {
  let applied = [];
  try {
    const raw = localStorage.getItem(MIGRATIONS_KEY);
    applied = raw ? JSON.parse(raw) : [];
  } catch (e) {
    applied = [];
  }
  let dirty = false;
  for (const mig of MIGRATIONS) {
    if (applied.includes(mig.version)) continue;
    const today = new Date().toISOString().slice(0, 10);
    const idSet = new Set(mig.completed);
    for (const t of state.tickets) {
      if (idSet.has(t.id) && t.status !== 'done') {
        t.status = 'done';
        if (!t.completed_at) t.completed_at = today;
      }
    }
    applied.push(mig.version);
    dirty = true;
    console.log(`Applied migration ${mig.version}: ${mig.completed.length} tickets marked done.`);
  }
  if (dirty) {
    localStorage.setItem(MIGRATIONS_KEY, JSON.stringify(applied));
    persist();
  }
}

function persist() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  renderStats();
}

/* ============================================================
 *  RENDER
 * ============================================================ */

const $phases = document.getElementById('phases');
const $globalStats = document.getElementById('globalStats');

function renderStats() {
  const total = state.tickets.length;
  const done = state.tickets.filter(t => t.status === 'done').length;
  const inProg = state.tickets.filter(t => t.status === 'in_progress').length;
  const pct = total === 0 ? 0 : Math.round(100 * done / total);
  $globalStats.innerHTML =
    `Total <span>${total}</span> · Done <span class="done">${done}</span> · ` +
    `In-Progress <span class="progress">${inProg}</span> · <span>${pct}%</span> complete`;
}

function renderAll() {
  $phases.innerHTML = '';

  const filterText = (document.getElementById('filterText').value || '').toLowerCase().trim();
  const filterTag = document.getElementById('filterTag').value;
  const filterStatus = document.getElementById('filterStatus').value;

  for (const phase of PHASES) {
    const phaseTickets = state.tickets
      .filter(t => t.phase === phase.id)
      .filter(t => matchesFilter(t, filterText, filterTag, filterStatus));

    const phaseEl = document.createElement('div');
    phaseEl.className = 'phase';
    if (loadCollapsed(phase.id)) phaseEl.classList.add('collapsed');

    /* If filtering is active and no tickets match, hide the phase entirely. */
    const filteringActive = filterText || filterTag || filterStatus;
    const allPhaseTicketsCount = state.tickets.filter(t => t.phase === phase.id).length;
    if (filteringActive && phaseTickets.length === 0 && allPhaseTicketsCount > 0) {
      phaseEl.classList.add('empty-by-filter');
    }

    const done = phaseTickets.filter(t => t.status === 'done').length;

    /* Header */
    const header = document.createElement('div');
    header.className = 'phase-header';
    header.innerHTML =
      `<span class="twist">▼</span>
       <h2>${escapeHtml(phase.name)}</h2>
       <span class="phase-desc">— ${escapeHtml(phase.desc)}</span>
       <span class="phase-count"><span class="done">${done}</span> / ${phaseTickets.length} done</span>`;
    header.addEventListener('click', () => {
      phaseEl.classList.toggle('collapsed');
      saveCollapsed(phase.id, phaseEl.classList.contains('collapsed'));
    });
    phaseEl.appendChild(header);

    /* Body — 5 lanes */
    const body = document.createElement('div');
    body.className = 'phase-body';
    for (const lane of LANES) {
      const laneTickets = phaseTickets.filter(t => t.status === lane);
      const laneEl = renderLane(phase.id, lane, laneTickets);
      body.appendChild(laneEl);
    }
    phaseEl.appendChild(body);

    $phases.appendChild(phaseEl);
  }

  renderStats();
}

function renderLane(phaseId, lane, tickets) {
  const el = document.createElement('div');
  el.className = 'lane';
  el.innerHTML =
    `<div class="lane-header lane-${lane}">${LANE_LABEL[lane]} <span class="lane-count">${tickets.length}</span></div>
     <div class="lane-body" data-phase="${phaseId}" data-lane="${lane}"></div>`;
  const body = el.querySelector('.lane-body');

  if (tickets.length === 0) {
    const hint = document.createElement('div');
    hint.className = 'empty-hint';
    hint.textContent = lane === 'backlog' ? '—' : '';
    body.appendChild(hint);
  } else {
    for (const t of tickets) body.appendChild(renderCard(t));
  }

  /* Drop handlers */
  body.addEventListener('dragover', e => {
    e.preventDefault();
    body.classList.add('drag-over');
  });
  body.addEventListener('dragleave', () => body.classList.remove('drag-over'));
  body.addEventListener('drop', e => {
    e.preventDefault();
    body.classList.remove('drag-over');
    const ticketId = e.dataTransfer.getData('text/plain');
    const t = state.tickets.find(x => x.id === ticketId);
    if (!t) return;
    const newPhase = Number(body.dataset.phase);
    const newLane = body.dataset.lane;
    if (t.phase !== newPhase || t.status !== newLane) {
      t.phase = newPhase;
      t.status = newLane;
      persist();
      renderAll();
    }
  });

  return el;
}

function renderCard(t) {
  const card = document.createElement('div');
  card.className = 'card';
  card.draggable = true;
  card.dataset.status = t.status;
  card.dataset.id = t.id;

  const tagsHtml = (t.tags || []).map(tag =>
    `<span class="tag ${tag}">${tag}</span>`
  ).join('');

  card.innerHTML =
    `<span class="card-id">${escapeHtml(t.id)}</span>
     <span class="card-title">${escapeHtml(t.title)}</span>
     <div class="card-tags">${tagsHtml}</div>`;

  card.addEventListener('click', () => openModal(t));
  card.addEventListener('dragstart', e => {
    e.dataTransfer.setData('text/plain', t.id);
    card.classList.add('dragging');
  });
  card.addEventListener('dragend', () => card.classList.remove('dragging'));

  return card;
}

function matchesFilter(t, filterText, filterTag, filterStatus) {
  if (filterText) {
    const hay = (t.id + ' ' + t.title + ' ' + (t.desc || '')).toLowerCase();
    if (!hay.includes(filterText)) return false;
  }
  if (filterTag && !(t.tags || []).includes(filterTag)) return false;
  if (filterStatus && t.status !== filterStatus) return false;
  return true;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]
  );
}

/* ============================================================
 *  COLLAPSE PERSISTENCE
 * ============================================================ */

function loadCollapsed(phaseId) {
  try {
    const raw = localStorage.getItem(STORAGE_KEY + ':collapsed');
    if (!raw) return false;
    const set = new Set(JSON.parse(raw));
    return set.has(phaseId);
  } catch { return false; }
}
function saveCollapsed(phaseId, isCollapsed) {
  let set;
  try {
    set = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY + ':collapsed') || '[]'));
  } catch { set = new Set(); }
  if (isCollapsed) set.add(phaseId); else set.delete(phaseId);
  localStorage.setItem(STORAGE_KEY + ':collapsed', JSON.stringify(Array.from(set)));
}

/* ============================================================
 *  MODAL (add / edit / delete)
 * ============================================================ */

const $modal = document.getElementById('modalBackdrop');
let editingId = null;

function openModal(t) {
  editingId = t ? t.id : null;
  document.getElementById('modalTitle').textContent = t ? `Edit ${t.id}` : 'New Card';
  document.getElementById('m_id').value = t ? t.id : suggestNextId();
  document.getElementById('m_title').value = t ? t.title : '';
  document.getElementById('m_desc').value = t ? (t.desc || '') : '';
  document.getElementById('m_status').value = t ? t.status : 'backlog';

  const phaseSel = document.getElementById('m_phase');
  phaseSel.innerHTML = '';
  for (const p of PHASES) {
    const opt = document.createElement('option');
    opt.value = p.id;
    opt.textContent = p.name;
    phaseSel.appendChild(opt);
  }
  phaseSel.value = t ? t.phase : 0;

  const tagRow = document.getElementById('m_tags');
  tagRow.innerHTML = '';
  const activeTags = new Set(t ? (t.tags || []) : []);
  for (const tag of TAGS) {
    const span = document.createElement('span');
    span.className = 'tag-pick ' + (activeTags.has(tag) ? 'active' : '');
    span.textContent = tag;
    span.addEventListener('click', () => span.classList.toggle('active'));
    tagRow.appendChild(span);
  }

  document.getElementById('m_delete').style.display = t ? '' : 'none';
  $modal.classList.add('open');
  setTimeout(() => document.getElementById('m_title').focus(), 30);
}

function closeModal() {
  $modal.classList.remove('open');
  editingId = null;
}

function suggestNextId() {
  /* Find the highest within phase 0 by default */
  const ids = state.tickets.map(t => t.id);
  let n = 1;
  while (ids.includes(`X.${n}`)) n++;
  return `X.${n}`;
}

document.getElementById('m_save').addEventListener('click', () => {
  const id = document.getElementById('m_id').value.trim();
  const title = document.getElementById('m_title').value.trim();
  if (!id || !title) { alert('ID and Title are required.'); return; }

  const phase = Number(document.getElementById('m_phase').value);
  const status = document.getElementById('m_status').value;
  const desc = document.getElementById('m_desc').value;
  const tags = Array.from(document.querySelectorAll('#m_tags .tag-pick.active')).map(el => el.textContent);

  if (editingId === null) {
    if (state.tickets.find(t => t.id === id)) { alert('That ID already exists.'); return; }
    state.tickets.push({ id, phase, status, title, desc, tags });
  } else {
    const t = state.tickets.find(t => t.id === editingId);
    if (id !== editingId && state.tickets.find(x => x.id === id)) {
      alert('That ID already exists.'); return;
    }
    Object.assign(t, { id, phase, status, title, desc, tags });
  }

  persist();
  renderAll();
  closeModal();
});

document.getElementById('m_cancel').addEventListener('click', closeModal);

document.getElementById('m_delete').addEventListener('click', () => {
  if (editingId === null) return;
  if (!confirm(`Delete ${editingId}?`)) return;
  state.tickets = state.tickets.filter(t => t.id !== editingId);
  persist();
  renderAll();
  closeModal();
});

$modal.addEventListener('click', e => { if (e.target === $modal) closeModal(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && $modal.classList.contains('open')) closeModal();
});

/* ============================================================
 *  TOOLBAR
 * ============================================================ */

document.getElementById('addBtn').addEventListener('click', () => openModal(null));
document.getElementById('filterText').addEventListener('input', renderAll);
document.getElementById('filterTag').addEventListener('change', renderAll);
document.getElementById('filterStatus').addEventListener('change', renderAll);

document.getElementById('collapseAllBtn').addEventListener('click', () => {
  for (const p of PHASES) saveCollapsed(p.id, true);
  renderAll();
});
document.getElementById('expandAllBtn').addEventListener('click', () => {
  for (const p of PHASES) saveCollapsed(p.id, false);
  renderAll();
});

document.getElementById('exportBtn').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `tsv_kanban_${new Date().toISOString().replace(/[:.]/g, '-')}.json`;
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('importBtn').addEventListener('click', () => {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'application/json,.json';
  input.addEventListener('change', () => {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        if (!Array.isArray(parsed.tickets)) throw new Error('Invalid format — missing tickets array');
        if (!confirm(`Import ${parsed.tickets.length} tickets, replacing current board?`)) return;
        state = parsed;
        persist();
        renderAll();
      } catch (e) {
        alert('Import failed: ' + e.message);
      }
    };
    reader.readAsText(file);
  });
  input.click();
});

document.getElementById('resetBtn').addEventListener('click', () => {
  if (!confirm('Reset to default seed? This wipes your local edits.')) return;
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(STORAGE_KEY + ':collapsed');
  localStorage.removeItem(MIGRATIONS_KEY);
  state = loadOrSeed();
  runPendingMigrations();
  renderAll();
});

/* ============================================================
 *  BOOT
 * ============================================================ */

renderAll();
</script>
</body>
</html>
